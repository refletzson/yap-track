<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de feedback</title>
    <link rel="stylesheet" href="style.css" >
</head>
<body>
    <header>
        <img src="Flamengo.png"
        alt="Maior de todos">
    <h1>formulario de feedback</h1>
    <p>
        Por favor preencha este formulario para nos ajudar a melhorar nossos servicos 
    </p>
    </header>
    <main>
        <div class="form-container">
            <form >
                 <ul>

                    <li>
                        <label for="name"> Seu Nome </label>
                        <input type="text" name="name" id="nome" placeholder="Seu Nome">
                    </li>

                    <li>
                        <label for="Email"> Seu Email </label>
                        <input type="email" name="Email" Id="Email" placeholder="Seu Email">
                    </li>
                    
                    <li>
                        <label for="Telefone"> Seu Telefone </label>
                        <input type="Tell" name="Telefone" Id="Tell" placeholder="Seu Telefone">
                    </li>
                        <li>
                        <label for="Data"> Insira a Data de Nascimento</label>
                        <input type="date" name="Data" Id="Email" placeholder="Seu Email">
                    </li>

                  <ul>
            </form>
        </div>
    </main>
    <footer>
        <P>    2025 Jose Hrenzo, todos os direitos reservados</P>
        <A href="https://www.instagram.com"> Instagram</A>
    </footer>
</body>
</html>
